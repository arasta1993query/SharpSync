name: Publish to NuGet

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v0.1.1-beta)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    # Required for NuGet Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test --configuration Release --no-build

    - name: Pack Projects
      run: |
        dotnet pack SharpSync.Core/SharpSync.Core.csproj --configuration Release --no-build --output ./nupkg
        dotnet pack SharpSync.Tool/SharpSync.Tool.csproj --configuration Release --no-build --output ./nupkg

    # Exchanges the OIDC token for a dynamic NuGet API key
    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: login
      with:
        # Based on your Trusted Publisher screenshot
        user: altostack

    - name: Push to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
